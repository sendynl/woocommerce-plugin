name: Deploy a new release to the WordPress.org Repository

on:
  release:
    types: [released]

jobs:
  deploy_to_wordpress_repository:
    name: Deploy to WP.org
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the source code
        uses: actions/checkout@v5

      - name: Verify readme.txt matches release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "^Stable tag: $VERSION$" readme.txt; then
            echo "::error::Stable tag in readme.txt does not match release version $VERSION"
            exit 1
          fi
          if ! grep -q "^= $VERSION =$" readme.txt; then
            echo "::error::No changelog entry found in readme.txt for version $VERSION"
            exit 1
          fi

      - name: Install Subversion
        run: |
          sudo apt update
          sudo apt install subversion

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install composer dependencies
        uses: php-actions/composer@v6
        with:
          dev: no
          args: "--optimize-autoloader"

      - name: Install Node dependencies
        run: npm ci

      - name: Build the frontend assets
        run: npm run build

      - name: Publish the plugin to the WordPress plugin directory
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: 'sendy'

      - name: Attach the zip file to the release
        run:
          gh release upload "${{ github.ref_name }}" "${{ github.workspace }}/sendy.zip" --clobber
        env:
          GITHUB_TOKEN: ${{ github.token }}
